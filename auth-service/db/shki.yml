---
# Shki standard library definition for Selene
# This file defines the globals injected by the shki Lua runtime

base: lua54

globals:
  # Dialect modules
  pg:
    property: read-only
    struct:
      schema:
        args:
          - type: string
        method: false

  mysql:
    property: read-only
    struct:
      schema:
        args:
          - type: string
        method: false

  sqlite:
    property: read-only
    struct:
      schema:
        args: []
        method: false

  # Builder classes
  EnumBuilder:
    property: read-only
    struct:
      new:
        args:
          - type: string
        method: false

  TableBuilder:
    property: read-only
    struct:
      new:
        args:
          - type: string
        method: false

  ColumnBuilder:
    property: read-only
    struct:
      new:
        args:
          - type: string
          - type: string
        method: false
      serial:
        args:
          - type: string
        method: false
      bigserial:
        args:
          - type: string
        method: false
      smallserial:
        args:
          - type: string
        method: false
      integer:
        args:
          - type: string
        method: false
      bigint:
        args:
          - type: string
        method: false
      smallint:
        args:
          - type: string
        method: false
      text:
        args:
          - type: string
        method: false
      varchar:
        args:
          - type: string
          - type: number
            required: false
        method: false
      char:
        args:
          - type: string
          - type: number
            required: false
        method: false
      boolean:
        args:
          - type: string
        method: false
      timestamp:
        args:
          - type: string
        method: false
      timestamptz:
        args:
          - type: string
        method: false
      date:
        args:
          - type: string
        method: false
      time:
        args:
          - type: string
        method: false
      uuid:
        args:
          - type: string
        method: false
      json:
        args:
          - type: string
        method: false
      jsonb:
        args:
          - type: string
        method: false
      numeric:
        args:
          - type: string
          - type: number
            required: false
          - type: number
            required: false
        method: false
      real:
        args:
          - type: string
        method: false
      double_precision:
        args:
          - type: string
        method: false
      bytea:
        args:
          - type: string
        method: false
      inet:
        args:
          - type: string
        method: false
      cidr:
        args:
          - type: string
        method: false
      enum_type:
        args:
          - type: string
          - type: string
        method: false
      array:
        args:
          - type: string
          - type: string
        method: false

  IndexBuilder:
    property: read-only
    struct:
      new:
        args:
          - type: string
        method: false

  # Enum constants
  ReferenceAction:
    property: read-only
    struct:
      NoAction:
        property: read-only
      Restrict:
        property: read-only
      Cascade:
        property: read-only
      SetNull:
        property: read-only
      SetDefault:
        property: read-only

  IndexMethod:
    property: read-only
    struct:
      BTree:
        property: read-only
      Hash:
        property: read-only
      Gist:
        property: read-only
      SpGist:
        property: read-only
      Gin:
        property: read-only
      Brin:
        property: read-only
